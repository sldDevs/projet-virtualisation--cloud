---
- name: Installation des Services Web et Base de Donnees
  hosts: all
  become: yes
  tasks:
    - name: Installation Apache sur le Webserver
      apt:
        name: apache2
        state: present
        update_cache: no
      when: inventory_hostname == '192.168.100.10'

    - name: Page d'accueil personnalisee
      copy:
        content: "<h1>PROJET TERMINE AVEC SUCCES : Pipeline final avec NAT et Services Ajoute.</h1><p>Deploye par Ansible - Architecture IaC.</p>"
        dest: /var/www/html/index.html
      when: inventory_hostname == '192.168.100.10'

    - name: Installation MariaDB sur le DBServer
      apt:
        name: mariadb-server
        state: present
        update_cache: no
      when: inventory_hostname == '192.168.10.10'
    - name: Créer l'utilisateur vagrant pour l'accès distant
      mysql_user:
        name: vagrant
        password: "votre_mot_de_passe"
        priv: '*.*:ALL'
        host: '%'
        state: present
      when: inventory_hostname == '192.168.10.10'